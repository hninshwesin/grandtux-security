# GrandTux Security Labs — Nginx site config
# Install path: /etc/nginx/sites-available/grandtux.com
# Enable: sudo ln -s /etc/nginx/sites-available/grandtux.com /etc/nginx/sites-enabled/
# Test:   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name grandtux.com www.grandtux.com;

    # After Certbot, this block redirects HTTP → HTTPS.
    # Keep until SSL is issued, then Certbot will adjust.

    root /var/www/grandtux.com;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static Next.js export
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache hashed/static assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
